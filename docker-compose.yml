version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=prod
      - DATABASE_URL_PROD=${DATABASE_URL_PROD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=https://impartial-magic-production-4d73.up.railway.app
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped
